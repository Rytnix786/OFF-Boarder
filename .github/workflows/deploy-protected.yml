name: Protected Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
    types: [opened, synchronize, reopened]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
    - name: Check permissions
      run: |
        echo "Checking if user has deploy permissions..."
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "PR detected - skipping deploy"
          exit 0
        fi

    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Clear caches
      run: rm -rf .next node_modules/.cache

    - name: Check middleware conflicts
      run: |
        chmod +x ./scripts/check-middleware.sh
        ./scripts/check-middleware.sh

    - name: Generate Prisma Client
      run: |
        # Use direct DB URL for client generation
        export DATABASE_URL="${{ secrets.DIRECT_DATABASE_URL }}"
        npx prisma generate

    - name: Run tests
      run: npm run test:run

    - name: Run security tests
      run: npm run test:security

    - name: Build application
      run: npm run build

    - name: Deploy to Vercel (if using Vercel)
      if: ${{ secrets.VERCEL_TOKEN }}
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'

    - name: Deploy to Railway (if using Railway)
      if: ${{ secrets.RAILWAY_TOKEN }}
      uses: railway-app/railway-action@v1
      with:
        api-token: ${{ secrets.RAILWAY_TOKEN }}
        project-id: ${{ secrets.RAILWAY_PROJECT_ID }}
        environment: production
