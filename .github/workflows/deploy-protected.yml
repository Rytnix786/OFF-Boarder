name: Protected Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
    types: [opened, synchronize, reopened]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
    - name: Check permissions
      run: |
        echo "Checking if user has deploy permissions..."
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "PR detected - skipping deploy"
          exit 0
        fi

    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Clear caches
      run: rm -rf .next node_modules/.cache

    - name: Check middleware conflicts
      run: |
        chmod +x ./scripts/check-middleware.sh
        ./scripts/check-middleware.sh

    - name: Generate Prisma Client
      run: |
        # Force clean client generation
        rm -rf node_modules/@prisma/client
        
        # Use direct database URL for client generation (compatible with driver adapter)
        export DATABASE_URL="${{ secrets.DIRECT_DATABASE_URL }}"
        echo "Using direct DB URL for client generation: $DATABASE_URL"
        
        # Generate client with direct connection
        npx prisma generate --schema=./prisma/schema.prisma
        
        # Wait for file system sync
        sleep 2
        
        # Check runtime files
        echo "Checking for runtime files:"
        find node_modules/@prisma/client/runtime/ -name "*.wasm*" -o -name "*.js" | head -5
        
        # Verify the specific file exists
        if [ -f "node_modules/@prisma/client/runtime/query_engine_bg.postgresql.wasm-base64.js" ]; then
          echo "✅ Runtime file found successfully"
        else
          echo "❌ Runtime file still missing"
          ls -la node_modules/@prisma/client/runtime/ || echo "Runtime directory missing"
          exit 1
        fi

    - name: Run tests
      run: npm run test:run

    - name: Run security tests
      run: npm run test:security

    - name: Build application
      run: npm run build

    - name: Deploy to Vercel (if using Vercel)
      if: ${{ secrets.VERCEL_TOKEN }}
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'

    - name: Deploy to Railway (if using Railway)
      if: ${{ secrets.RAILWAY_TOKEN }}
      uses: railway-app/railway-action@v1
      with:
        api-token: ${{ secrets.RAILWAY_TOKEN }}
        project-id: ${{ secrets.RAILWAY_PROJECT_ID }}
        environment: production
