name: Deploy to Production

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}  # GitHub Actions syntax - ignore IDE warnings
      DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}  # GitHub Actions syntax - ignore IDE warnings
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}  # GitHub Actions syntax - ignore IDE warnings
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}  # GitHub Actions syntax - ignore IDE warnings
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}  # GitHub Actions syntax - ignore IDE warnings

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Run tests
      run: npm run test:run

    - name: Run security tests
      run: npm run test:security

    - name: Build application
      run: npm run build

    - name: Deploy to Vercel (if using Vercel)
      if: ${{ secrets.VERCEL_TOKEN }}  # GitHub Actions syntax - ignore IDE warnings
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}  # GitHub Actions syntax - ignore IDE warnings
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}  # GitHub Actions syntax - ignore IDE warnings
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}  # GitHub Actions syntax - ignore IDE warnings
        vercel-args: '--prod'

    - name: Deploy to Railway (if using Railway)
      if: ${{ secrets.RAILWAY_TOKEN }}  # GitHub Actions syntax - ignore IDE warnings
      uses: railway-app/railway-action@v1
      with:
        api-token: ${{ secrets.RAILWAY_TOKEN }}  # GitHub Actions syntax - ignore IDE warnings
        project-id: ${{ secrets.RAILWAY_PROJECT_ID }}
        environment: production
