    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Fix vulnerabilities for successful testing
      run: npm audit fix || npm audit fix --force || true

    - name: Run linting
      run: npm run lint

    - name: Run security tests
      run: npm run test:security

    - name: Run all tests
      run: npm run test:run

    - name: Build project
      run: npm run build
